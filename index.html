<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RichAds Mini App</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #070a12;
            color: #f8fafc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background: radial-gradient(circle at top, rgba(56, 189, 248, 0.15), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.12), transparent 20%),
                        linear-gradient(180deg, #020617 0%, #090d1f 100%);
        }

        .panel {
            width: 100%;
            max-width: 430px;
            border-radius: 28px;
            padding: 28px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 24px 90px rgba(0, 0, 0, 0.25);
        }

        h1 {
            margin: 0 0 14px;
            font-size: 1.95rem;
            letter-spacing: -0.04em;
            color: #e2e8f0;
        }

        p {
            margin: 0 0 24px;
            line-height: 1.7;
            color: #cbd5e1;
        }

        .status {
            margin: 0 0 24px;
            padding: 16px;
            border-radius: 18px;
            background: rgba(148, 163, 184, 0.08);
            color: #e2e8f0;
            border: 1px solid rgba(148, 163, 184, 0.12);
        }

        button {
            width: 100%;
            padding: 16px 20px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #38bdf8, #8b5cf6);
            color: #ffffff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.18s ease, filter 0.18s ease, opacity 0.18s ease;
            box-shadow: 0 18px 40px rgba(56, 189, 248, 0.25);
        }

        button:hover {
            transform: translateY(-1px);
            filter: brightness(1.04);
        }

        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            box-shadow: none;
        }

        .footer {
            margin-top: 22px;
            font-size: 0.95rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h1>RichAds Mini App</h1>
        <p>Нажмите кнопку ниже, чтобы показать рекламное объявление. Если админ не настроил RichAds, вы увидите понятную подсказку.</p>
        <div class="status" id="status-text">Загружаем настройки...</div>
        <button id="show-ad">Показать рекламу</button>
        <div class="footer">Если кнопка не запускает рекламу, обратитесь к администратору бота.</div>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
        const STATUS = document.getElementById('status-text');
        const BUTTON = document.getElementById('show-ad');
        const PUB_ID = '1008859';
        const APP_ID = '395090';

        function updateStatus(text) {
            STATUS.textContent = text;
        }

        function disableButton(label) {
            BUTTON.disabled = true;
            BUTTON.textContent = label;
        }

        function enableButton(label = 'Показать рекламу') {
            BUTTON.disabled = false;
            BUTTON.textContent = label;
        }

        function applyTheme() {
            const tg = window.Telegram?.WebApp || window.Telegram?.webApp;
            if (!tg) return;
            if (typeof tg.ready === 'function') tg.ready();
            const params = tg.themeParams || {};
            if (params.bg_color) document.body.style.background = params.bg_color;
        }

        function formatError(error) {
            if (!error) return 'Неизвестная ошибка';
            if (typeof error === 'string') return error;
            if (error.message) return error.message;
            try {
                return JSON.stringify(error);
            } catch {
                return String(error);
            }
        }

        function logError(error) {
            const text = formatError(error);
            console.error('RichAds error:', error);
            updateStatus(`Ошибка показа рекламы: ${text}`);
            enableButton('Повторить');
        }

        window.addEventListener('error', event => {
            console.error('Window error:', event.error || event.message);
            updateStatus('Ошибка загрузки страницы: ' + (event.message || 'см. консоль'));
            disableButton('Ошибка');
        });

        window.addEventListener('unhandledrejection', event => {
            console.error('Unhandled rejection:', event.reason);
            updateStatus('Ошибка загрузки рекламы: ' + formatError(event.reason));
            enableButton('Повторить');
        });

        applyTheme();

        const AdsClass = window.TelegramAdsController || (typeof TelegramAdsController !== 'undefined' ? TelegramAdsController : null);
        const existingController = window.TelegramAdsController && typeof window.TelegramAdsController.initialize === 'function' ? window.TelegramAdsController : null;
        const isConfigured = PUB_ID !== 'YOUR_PUB_ID' && APP_ID !== 'YOUR_APP_ID';

        if (!AdsClass && !existingController) {
            updateStatus('RichAds не загружен. Проверьте подключение tg-ob.js.');
            disableButton('Реклама недоступна');
            console.log('RichAds class not found:', window.TelegramAdsController, typeof TelegramAdsController, window.Telegram);
        } else if (!isConfigured) {
            updateStatus('RichAds не настроен. Администратор должен добавить pubId и appId.');
            disableButton('Настройте RichAds');
        } else {
            updateStatus('Готово. Нажмите кнопку, чтобы запустить рекламу.');

            const richadsController = existingController || new AdsClass();

            try {
                if (!existingController) {
                    richadsController.initialize({
                        pubId: PUB_ID,
                        appId: APP_ID,
                        debug: true
                    });
                } else {
                    richadsController.initialize({
                        pubId: PUB_ID,
                        appId: APP_ID,
                        debug: true
                    });
                }
            } catch (error) {
                logError(error);
                return;
            }

            async function tryAdMethods() {
                const methods = [
                    { name: 'Video', fn: () => richadsController.triggerInterstitialVideo() },
                    { name: 'Banner', fn: () => richadsController.triggerInterstitialBanner() },
                    { name: 'Push', fn: () => richadsController.triggerNativeNotification() }
                ];

                for (const method of methods) {
                    try {
                        updateStatus(`Пробуем показать ${method.name}-рекламу...`);
                        const result = await method.fn();
                        console.log(`Ad ${method.name} result:`, result);
                        updateStatus(`Реклама ${method.name} показана.`);
                        enableButton('Показать рекламу');
                        return;
                    } catch (error) {
                        console.warn(`Ad ${method.name} failed:`, error);
                    }
                }

                throw new Error('Ни один формат рекламы не доступен');
            }

            BUTTON.addEventListener('click', async () => {
                disableButton('Загрузка...');
                try {
                    await tryAdMethods();
                } catch (error) {
                    logError(error);
                }
            });
        }

        setTimeout(() => {
            if (STATUS.textContent === 'Загружаем настройки...') {
                updateStatus('Статус не обновляется. Возможно, что скрипт не загружается или ошибки в консоли.');
                disableButton('Ошибка');
            }
        }, 2200);
    </script>
</body>
</html>
