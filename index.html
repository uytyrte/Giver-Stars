<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RichAds Mini App FIX</title>
</head>
<body style="margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;">

<div style="max-width:420px;width:100%;padding:20px;border-radius:20px;background:#111827;">
    <h2>RichAds Test</h2>

    <div id="status">Loading...</div>

    <pre id="log" style="height:150px;overflow:auto;background:#000;padding:10px;border-radius:10px;"></pre>

    <button id="btn" style="margin-top:10px;width:100%;padding:15px;border-radius:10px;">
        Show Ad
    </button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>

<script>
const PUB_ID = '1008859';
const APP_ID = '395090';

const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const btn = document.getElementById('btn');

function log(msg){
    console.log(msg);
    logEl.textContent += msg + "\\n";
}

function setStatus(msg){
    statusEl.textContent = msg;
    log(msg);
}

const tg = window.Telegram?.WebApp;

// ❌ НЕ в Telegram
if (!tg) {
    setStatus("❌ Not inside Telegram");
    btn.disabled = true;
    throw new Error("No Telegram");
}

// ✅ обов’язково
tg.ready();

// ❌ НЕ через web_app кнопку
if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
    setStatus("❌ Open via web_app button");
    btn.disabled = true;
    throw new Error("No initData");
}

log("✅ Telegram OK");
log(JSON.stringify(tg.initDataUnsafe, null, 2));

let controller;

// ⏱ даємо Telegram прогрузитись
setTimeout(initAds, 300);

function initAds(){
    try{
        controller = new TelegramAdsController();

        const result = controller.initialize({
            pubId: PUB_ID,
            appId: APP_ID,
            debug: true
        });

        if (result && typeof result.then === 'function'){
            result.then(()=>{
                setStatus("✅ Ads initialized");
            }).catch(err=>{
                setStatus("❌ Init error: " + err.message);
            });
        } else {
            setStatus("✅ Ads initialized (sync)");
        }

    }catch(e){
        setStatus("❌ Init crash: " + e.message);
    }
}

btn.onclick = async () => {
    btn.disabled = true;
    setStatus("Requesting ad...");

    try{
        // 🎥 відео
        let res = controller.triggerInterstitialVideo?.();

        if (res && typeof res.then === 'function'){
            res = await res;
        }

        log("Video result: " + JSON.stringify(res));
        setStatus("Ad requested (video)");

    }catch(e){
        log("Video failed: " + e.message);

        try{
            // 🔁 fallback банер
            let res = controller.triggerInterstitialBanner?.();

            if (res && typeof res.then === 'function'){
                res = await res;
            }

            log("Banner result: " + JSON.stringify(res));
            setStatus("Fallback banner requested");

        }catch(e2){
            log("Banner failed: " + e2.message);
            setStatus("❌ No ads available");
        }
    }

    btn.disabled = false;
};
</script>

</body>
</html>
